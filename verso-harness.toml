package_name = "AlgebraicCombinatoricsBlueprint"
blueprint_main = "BlueprintMain"
formalization_path = "algebraic-combinatorics"
chapter_root = "AlgebraicCombinatoricsBlueprint/Chapters"
tex_source_glob = "algebraic-combinatorics/blueprint/src/chapter_*.tex"

[lt]
default_chapters = [
  "AlgebraicCombinatoricsBlueprint/Chapters/NotationsExamples.lean",
]

[lt.node_kinds]
theorem = "theorem"
definition = "definition"
lemma = "lemma_"
corollary = "corollary"
proof = "proof"

[harness]
native_warnings = false
strict_external_code = true
non_port_chapters = [
  "AlgebraicCombinatoricsBlueprint/Chapters/PortingStatus.lean",
]
